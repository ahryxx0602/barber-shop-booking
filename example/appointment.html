<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>The Appointment - Editorial Vintage Barbershop</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9c161b",
                        "background-light": "#f8f6f6",
                        "background-dark": "#211112",
                    },
                    fontFamily: {
                        "display": ["Epilogue", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Epilogue', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings:
                'FILL' 0,
                'wght' 400,
                'GRAD' 0,
                'opsz' 24
        }

        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }

        /* Custom Scrollbar for time slots */
        .time-scroll::-webkit-scrollbar {
            height: 6px;
        }

        .time-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .time-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .time-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <!-- Minimal Header for Focused View (Rule 3) -->
    <div class="w-full max-w-[600px] mb-8 flex items-center">
        <button
            class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors mr-4 focus:outline-none focus:ring-2 focus:ring-primary">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h1 class="text-2xl font-bold font-display tracking-tight">The Appointment</h1>
    </div>
    <!-- Main Booking Container -->
    <main
        class="w-full max-w-[600px] bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded shadow-sm overflow-hidden">
        <div class="p-8 space-y-10">
            <!-- Step 1: Select Service -->
            <section aria-labelledby="step-1-title">
                <div class="flex items-center mb-4">
                    <span
                        class="flex items-center justify-center w-6 h-6 rounded-full bg-primary text-white text-xs font-bold mr-3">1</span>
                    <h2 class="text-lg font-semibold font-display" id="step-1-title">Select Service</h2>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <!-- Service Option: Selected -->
                    <label
                        class="relative flex flex-col p-4 border-2 border-primary rounded cursor-pointer bg-primary/5 hover:bg-primary/10 transition-colors">
                        <input checked="" class="sr-only" name="service" type="radio" value="haircut" />
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-medium text-primary">Classic Haircut</span>
                            <span class="font-semibold text-primary">$45</span>
                        </div>
                        <span class="text-sm text-slate-600 dark:text-slate-400">45 Minutes. Traditional scissor and
                            clipper work.</span>
                        <div class="absolute top-3 right-3 text-primary hidden">
                            <span class="material-symbols-outlined fill text-lg">check_circle</span>
                        </div>
                    </label>
                    <!-- Service Option: Unselected -->
                    <label
                        class="relative flex flex-col p-4 border border-slate-200 dark:border-slate-700 rounded cursor-pointer hover:border-slate-300 dark:hover:border-slate-600 transition-colors">
                        <input class="sr-only" name="service" type="radio" value="shave" />
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-medium text-slate-800 dark:text-slate-200">Straight Razor Shave</span>
                            <span class="font-semibold text-slate-800 dark:text-slate-200">$55</span>
                        </div>
                        <span class="text-sm text-slate-500 dark:text-slate-400">45 Minutes. Hot towel, lather, close
                            shave.</span>
                    </label>
                    <!-- Service Option: Unselected -->
                    <label
                        class="relative flex flex-col p-4 border border-slate-200 dark:border-slate-700 rounded cursor-pointer hover:border-slate-300 dark:hover:border-slate-600 transition-colors">
                        <input class="sr-only" name="service" type="radio" value="combo" />
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-medium text-slate-800 dark:text-slate-200">The Full Service</span>
                            <span class="font-semibold text-slate-800 dark:text-slate-200">$90</span>
                        </div>
                        <span class="text-sm text-slate-500 dark:text-slate-400">90 Minutes. Haircut &amp; Straight
                            Razor Shave.</span>
                    </label>
                    <!-- Service Option: Unselected -->
                    <label
                        class="relative flex flex-col p-4 border border-slate-200 dark:border-slate-700 rounded cursor-pointer hover:border-slate-300 dark:hover:border-slate-600 transition-colors">
                        <input class="sr-only" name="service" type="radio" value="beard" />
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-medium text-slate-800 dark:text-slate-200">Beard Trim</span>
                            <span class="font-semibold text-slate-800 dark:text-slate-200">$30</span>
                        </div>
                        <span class="text-sm text-slate-500 dark:text-slate-400">30 Minutes. Shaping, line-up, beard oil
                            finish.</span>
                    </label>
                </div>
            </section>
            <hr class="border-slate-100 dark:border-slate-800" />
            <!-- Step 2: Select Barber -->
            <section aria-labelledby="step-2-title">
                <div class="flex items-center mb-4">
                    <span
                        class="flex items-center justify-center w-6 h-6 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-xs font-bold mr-3">2</span>
                    <h2 class="text-lg font-semibold font-display" id="step-2-title">Choose Barber</h2>
                </div>
                <div class="flex gap-6 overflow-x-auto pb-2 time-scroll">
                    <!-- Barber: Selected -->
                    <label class="flex flex-col items-center cursor-pointer group flex-shrink-0">
                        <input checked="" class="sr-only" name="barber" type="radio" value="james" />
                        <div
                            class="w-20 h-20 rounded-full overflow-hidden border-2 border-primary p-0.5 mb-2 transition-all duration-300">
                            <img alt="Portrait of James" class="w-full h-full object-cover rounded-full"
                                data-alt="Male barber portrait"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuCS7U_C7BJF2ZH8LfXoTaQ70it-q_krooetsRPBofkyistnTIJbL8wRgFocnoUTnnOyMt8KPhqBVYI9FDijxVhpy15djK0Bf1uj_QYNuF6VoOAlCqCSoVRC5mrdTMEkFZdQXCDRyEmqCqd9hjyNztXwxLqqeWnIQN8ZexvDhXQpsPVxSSzS4nj7bcrAyzx_a8MwA1_nkzZ6H6w4H-_mUaYwpSDUgOwalsW493yQkmYb7kFGS_ABN0RbdrEOSclE9-hGXkJkAngUDZM" />
                        </div>
                        <span class="text-sm font-medium text-primary">James</span>
                    </label>
                    <!-- Barber: Unselected (Grayscale) -->
                    <label class="flex flex-col items-center cursor-pointer group flex-shrink-0">
                        <input class="sr-only" name="barber" type="radio" value="michael" />
                        <div
                            class="w-20 h-20 rounded-full overflow-hidden border border-transparent group-hover:border-slate-300 dark:group-hover:border-slate-600 p-0.5 mb-2 transition-all duration-300">
                            <img alt="Portrait of Michael"
                                class="w-full h-full object-cover rounded-full grayscale group-hover:grayscale-0 transition-all duration-300 opacity-70 group-hover:opacity-100"
                                data-alt="Male barber portrait grayscale"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBDRnHgyJJGze1u-npBWe9VedZPeKVhs8HOSIFrSI4FDWISrXElRe6ww6AfGY8tBmhAvOR34ikyZ5raj8m5qAmfy3uVzdRDOQ9VGMJ98RETuiScRAzip3wuS1GVwQZdL4Iw9DrUoMP0oA3WvBFWSEJRsnDQv2n52nOYIy0lIdibL3GV74szMFtXUvJSgN6k9csUtZZ4RzApGU4O5BVozUjvS66Hrr2zGtt4lZgybRFTOI0YEDHGCu_nrFmPxOOYRSufDm64Nn2sxpA" />
                        </div>
                        <span
                            class="text-sm font-medium text-slate-500 dark:text-slate-400 group-hover:text-slate-800 dark:group-hover:text-slate-200">Michael</span>
                    </label>
                    <!-- Barber: Unselected (Grayscale) -->
                    <label class="flex flex-col items-center cursor-pointer group flex-shrink-0">
                        <input class="sr-only" name="barber" type="radio" value="david" />
                        <div
                            class="w-20 h-20 rounded-full overflow-hidden border border-transparent group-hover:border-slate-300 dark:group-hover:border-slate-600 p-0.5 mb-2 transition-all duration-300">
                            <img alt="Portrait of David"
                                class="w-full h-full object-cover rounded-full grayscale group-hover:grayscale-0 transition-all duration-300 opacity-70 group-hover:opacity-100"
                                data-alt="Male barber portrait grayscale"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuC5ax11hrGWbucnet5jiw3paZe3a3HXHaJesQvAxYhiwGFGqhvCocfA_NX6mt0BWcp3aS17SryoAi6iy-HO_ww-LnXMEeBRNdHmF-kVL9Esgj782wiFOg31MA3uoP1JM6YIuuiJ2PNmlLrTV6ZbIYcJ98m7mCmcHID8A2r0TwABvB5Ctuk-EGNGELQj6Ji7dNQ1nX0ndv5sEYC2iKNhKd71mki4Ai4O25A92F8OSC11vPD9WjSbpG_Y9jkxeuQOKYhy5c_aCCFdYpE" />
                        </div>
                        <span
                            class="text-sm font-medium text-slate-500 dark:text-slate-400 group-hover:text-slate-800 dark:group-hover:text-slate-200">David</span>
                    </label>
                    <!-- Barber: Unselected (Grayscale) -->
                    <label class="flex flex-col items-center cursor-pointer group flex-shrink-0">
                        <input class="sr-only" name="barber" type="radio" value="anyone" />
                        <div
                            class="w-20 h-20 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center border border-transparent group-hover:border-slate-300 dark:group-hover:border-slate-600 p-0.5 mb-2 transition-all duration-300 text-slate-400">
                            <span class="material-symbols-outlined text-3xl">groups</span>
                        </div>
                        <span
                            class="text-sm font-medium text-slate-500 dark:text-slate-400 group-hover:text-slate-800 dark:group-hover:text-slate-200">First
                            Available</span>
                    </label>
                </div>
            </section>
            <hr class="border-slate-100 dark:border-slate-800" />
            <!-- Step 3: Date & Time -->
            <section aria-labelledby="step-3-title" class="opacity-100 transition-opacity duration-500">
                <div class="flex items-center mb-6">
                    <span
                        class="flex items-center justify-center w-6 h-6 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-xs font-bold mr-3">3</span>
                    <h2 class="text-lg font-semibold font-display" id="step-3-title">Date &amp; Time</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Calendar -->
                    <div>
                        <div class="flex items-center justify-between mb-4">
                            <button class="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 rounded text-slate-500"
                                type="button">
                                <span class="material-symbols-outlined text-sm">chevron_left</span>
                            </button>
                            <span class="font-medium text-sm">October 2023</span>
                            <button class="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 rounded text-slate-500"
                                type="button">
                                <span class="material-symbols-outlined text-sm">chevron_right</span>
                            </button>
                        </div>
                        <div class="grid grid-cols-7 gap-1 text-center mb-2">
                            <span class="text-xs text-slate-400 font-medium">Su</span>
                            <span class="text-xs text-slate-400 font-medium">Mo</span>
                            <span class="text-xs text-slate-400 font-medium">Tu</span>
                            <span class="text-xs text-slate-400 font-medium">We</span>
                            <span class="text-xs text-slate-400 font-medium">Th</span>
                            <span class="text-xs text-slate-400 font-medium">Fr</span>
                            <span class="text-xs text-slate-400 font-medium">Sa</span>
                        </div>
                        <div class="grid grid-cols-7 gap-1 text-sm">
                            <!-- Empty days -->
                            <div></div>
                            <div></div>
                            <div></div>
                            <!-- Days -->
                            <button
                                class="w-8 h-8 flex items-center justify-center rounded-full text-slate-300 dark:text-slate-600 cursor-not-allowed"
                                disabled="" type="button">1</button>
                            <button
                                class="w-8 h-8 flex items-center justify-center rounded-full text-slate-300 dark:text-slate-600 cursor-not-allowed"
                                disabled="" type="button">2</button>
                            <button
                                class="w-8 h-8 flex items-center justify-center rounded-full text-slate-300 dark:text-slate-600 cursor-not-allowed"
                                disabled="" type="button">3</button>
                            <button
                                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                                type="button">4</button>
                            <button
                                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                                type="button">5</button>
                            <button
                                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                                type="button">6</button>
                            <button
                                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                                type="button">7</button>
                            <button
                                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                                type="button">8</button>
                            <button
                                class="w-8 h-8 flex items-center justify-center rounded-full bg-primary text-white font-medium shadow-sm"
                                type="button">9</button>
                            <button
                                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                                type="button">10</button>
                            <button
                                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                                type="button">11</button>
                            <button
                                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                                type="button">12</button>
                            <button
                                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                                type="button">13</button>
                            <button
                                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                                type="button">14</button>
                            <button
                                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                                type="button">15</button>
                        </div>
                    </div>
                    <!-- Time Slots -->
                    <div>
                        <h3 class="text-sm font-medium mb-3 text-slate-800 dark:text-slate-200">Available on Oct 9</h3>
                        <div class="grid grid-cols-2 gap-2 h-48 overflow-y-auto pr-2 time-scroll">
                            <label class="cursor-pointer">
                                <input class="sr-only" name="time" type="radio" value="0900" />
                                <div
                                    class="py-2 px-3 text-center border border-slate-200 dark:border-slate-700 rounded text-sm hover:border-primary hover:text-primary transition-colors">
                                    9:00 AM</div>
                            </label>
                            <label class="cursor-pointer">
                                <input class="sr-only" name="time" type="radio" value="0930" />
                                <div
                                    class="py-2 px-3 text-center border border-slate-200 dark:border-slate-700 rounded text-sm hover:border-primary hover:text-primary transition-colors">
                                    9:30 AM</div>
                            </label>
                            <label class="cursor-pointer">
                                <input class="sr-only" name="time" type="radio" value="1000" />
                                <div
                                    class="py-2 px-3 text-center border border-slate-200 dark:border-slate-700 rounded text-sm hover:border-primary hover:text-primary transition-colors">
                                    10:00 AM</div>
                            </label>
                            <label class="cursor-pointer">
                                <input checked="" class="sr-only" name="time" type="radio" value="1030" />
                                <div
                                    class="py-2 px-3 text-center border border-primary bg-primary/5 text-primary font-medium rounded text-sm">
                                    10:30 AM</div>
                            </label>
                            <label class="cursor-pointer">
                                <input class="sr-only" name="time" type="radio" value="1100" />
                                <div
                                    class="py-2 px-3 text-center border border-slate-200 dark:border-slate-700 rounded text-sm hover:border-primary hover:text-primary transition-colors">
                                    11:00 AM</div>
                            </label>
                            <label class="cursor-pointer opacity-50">
                                <input class="sr-only" disabled="" name="time" type="radio" value="1130" />
                                <div
                                    class="py-2 px-3 text-center border border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 rounded text-sm line-through">
                                    11:30 AM</div>
                            </label>
                            <label class="cursor-pointer">
                                <input class="sr-only" name="time" type="radio" value="1300" />
                                <div
                                    class="py-2 px-3 text-center border border-slate-200 dark:border-slate-700 rounded text-sm hover:border-primary hover:text-primary transition-colors">
                                    1:00 PM</div>
                            </label>
                        </div>
                    </div>
                </div>
            </section>
        </div>
        <!-- Sticky Footer CTA -->
        <div class="p-6 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-200 dark:border-slate-800">
            <div class="flex justify-between items-center mb-4 text-sm">
                <span class="text-slate-500 dark:text-slate-400">Total</span>
                <span class="font-bold text-lg text-slate-900 dark:text-slate-100">$45.00</span>
            </div>
            <button
                class="w-full py-4 bg-primary hover:bg-primary/90 text-white rounded font-bold tracking-wide uppercase text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary dark:focus:ring-offset-slate-900"
                type="submit">
                Confirm Appointment
            </button>
            <p class="text-center text-xs text-slate-400 mt-3 flex items-center justify-center gap-1">
                <span class="material-symbols-outlined text-[14px]">lock</span>
                Secure booking. Pay after service.
            </p>
        </div>
    </main>
</body>

</html>
